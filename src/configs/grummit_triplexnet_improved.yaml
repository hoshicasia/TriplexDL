defaults:
  - grummit_triplexnet
  - _self_

target_class_ratio: 5.0

k_fold: 3

model:
  dropout: 0.25
  drop_path_rate: 0.20
  aux_loss_weight: 0.7

datasets:
  train:
    nuc_mask_prob: 0.03
    coord_shift_max: 50

optimizer:
  lr: 1.2e-4

warmup:
  enabled: true
  warmup_epochs: 4
  warmup_start_factor: 0.05

trainer:
  threshold_tuning_during_training: false
  n_epochs: 200
  early_stop: 25

hard_neg_mining_freq: 5
hard_neg_ratio: 0.5

writer:
  run_name: "grummit_triplexnet_improved"
  experiment_name: "grummit_triplexnet_improved"
