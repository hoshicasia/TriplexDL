defaults:
  - baseline
  - _self_

target_class_ratio: 3.0

trainer:
  n_epochs: 60
  early_stop: 15
  threshold_tuning_during_training: true
  tta: true

datasets:
  train:
    positional_omics: true

model:
  aux_loss_weight: 0.7
  positional_omics: true

loss_function:
  _target_: src.loss.TriplexMILLoss
  aggregation_mode: "attention_noisy_or"
  attention_temperature: 0.7
  attention_mix_alpha: 0.6
  attention_entropy_weight: 0.01
  top_k_ratio: 0.05
  pos_weight: 2.0
  nuc_loss_weight: 0.0
  label_smoothing: 0.05
  positive_sparsity_weight: 0.02
  negative_sparsity_weight: 0.0
  smoothness_weight: 0.01
  smoothness_positive_only: true

lr_scheduler:
  T_max: 60

writer:
  run_name: "grummit_triplexnet_tier1"
