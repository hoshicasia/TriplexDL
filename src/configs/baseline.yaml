defaults:
  - _self_

seed: 42
k_fold: 0

split_method: genomic_bin_representative
bin_size: 2000000
test_frac: 0.15
val_frac: 0.15
target_class_ratio: 5.0
rep_split_n_quantiles: 4
rep_split_min_stratum_count: 3

hard_neg_mining_freq: 0
hard_neg_ratio: 0.5

trainer:
  n_epochs: 35
  save_dir: "saved"
  save_period: 5
  resume_from: null
  threshold_tuning_during_training: false
  compute_nuc_metrics: false
  early_stop: 8
  device: "auto"
  log_step: 10
  accumulate_grad_batches: 4

model:
  _target_: src.model.TriplexNet
  n_omics_features: 442
  dropout: 0.25
  n_channels: 192
  n_dilated_blocks: 9
  kernel_size: 3
  se_reduction: 4
  drop_path_rate: 0.15
  aux_loss_weight: 0.5
  nucleotide_level: true


loss_function:
  _target_: src.loss.TriplexMILLoss
  top_k_ratio: 0.05
  aggregation_mode: "topk"
  pos_weight: 2.0
  nuc_loss_weight: 0.0
  label_smoothing: 0.05
  positive_sparsity_weight: 0.02
  negative_sparsity_weight: 0.0
  smoothness_weight: 0.01
  smoothness_positive_only: true


optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]

lr_scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 50
  eta_min: 1.0e-6

warmup:
  enabled: true
  warmup_epochs: 3
  warmup_start_factor: 0.1

datasets:
  train:
    _target_: src.datasets.TriplexDataset
    pos_fasta_path: "grummit/triplexDNA_pos.fa"
    neg_fasta_path: "grummit/triplexDNA_neg.fa"
    bed_dir: "Neural"
    max_seq_len: 1000
    limit: null
    name: "train"
    positional_omics: false
    nucleotide_level: true
    rc_augment: true
    nuc_mask_prob: 0.02
    coord_shift_max: 30
    omics_feature_mode: "coverage_score"

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 8
  num_workers: 4
  pin_memory: true

metrics:
  train:
    - _target_: src.metrics.AUCMetric
      nucleotide_level: false
      use_seq_logit: true
    - _target_: src.metrics.F1Metric
      nucleotide_level: false
      use_seq_logit: true

  inference:
    - _target_: src.metrics.MCCMetric
      nucleotide_level: false
      use_seq_logit: true
    - _target_: src.metrics.PrecisionMetric
      nucleotide_level: false
      use_seq_logit: true
    - _target_: src.metrics.RecallMetric
      nucleotide_level: false
      use_seq_logit: true
    - _target_: src.metrics.F1Metric
      nucleotide_level: false
      use_seq_logit: true
    - _target_: src.metrics.AUCMetric
      nucleotide_level: false
      use_seq_logit: true
    - _target_: src.metrics.APMetric
      nucleotide_level: false
      use_seq_logit: true

writer:
  _target_: src.logger.comet_writer.CometMLWriter
  project_name: "triplexnet"
  experiment_name: "triplexnet_grummit"
  run_name: "grummit_triplexnet_default"
  api_key: null
  workspace: null
  mode: "online"
  loss_names:
    - "loss"
